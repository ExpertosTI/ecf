# SaaS ECF DGII — Docker Compose con Traefik
# Cumple requisitos DGII: TLS, aislamiento, logs, health checks

services:

  # Traefik — Reverse Proxy & TLS termination
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=ecf_net"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redirigir HTTP a HTTPS (obligatorio DGII)
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # TLS con Let's Encrypt (produccion)
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@tu-dominio.do}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # Logs de acceso (requerido para auditoria DGII)
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"
      - "--accesslog.format=json"
      # Seguridad: NO loggear headers por defecto (prevenir fuga de API keys)
      - "--accesslog.fields.headers.defaultmode=drop"
      - "--accesslog.fields.headers.names.Content-Type=keep"
      - "--accesslog.fields.headers.names.User-Agent=keep"
      - "--accesslog.fields.headers.names.Accept=keep"
      # Seguridad
      - "--ping=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
      - traefik_logs:/var/log/traefik
    networks:
      - ecf_net
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    labels:
      # Middleware de seguridad global
      - "traefik.enable=true"
      # Security headers (DGII compliance)
      - "traefik.http.middlewares.security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.security-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.security-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.security-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.security-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      # Rate limiting global
      - "traefik.http.middlewares.rate-limit.ratelimit.average=100"
      - "traefik.http.middlewares.rate-limit.ratelimit.burst=50"
      - "traefik.http.middlewares.rate-limit.ratelimit.period=1m"

  # API Gateway (FastAPI)
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://saas_ecf:${DB_PASSWORD}@postgres:5432/saas_ecf
      REDIS_URL: redis://redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      PSFE_CERT_B64: ${PSFE_CERT_B64}
      PSFE_KEY_B64: ${PSFE_KEY_B64}
      DGII_CA_B64: ${DGII_CA_B64}
      VAULT_MASTER_KEY: ${VAULT_MASTER_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      METRICS_API_KEY: ${METRICS_API_KEY:-}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-60}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-60}
      TZ: America/Santo_Domingo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecf_net
    labels:
      - "traefik.enable=true"
      # Router API
      - "traefik.http.routers.api.rule=Host(`${ECF_DOMAIN:-ecf.local}`) && PathPrefix(`/v1`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api.middlewares=security-headers@docker,rate-limit@docker"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
      # Health y metrics: solo accesible internamente (NO expuesto por Traefik)
      # El healthcheck de Docker accede directo al container en port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Queue Worker (procesa e-CF en background)
  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: python -m ecf_core.worker_main
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://saas_ecf:${DB_PASSWORD}@postgres:5432/saas_ecf
      REDIS_URL: redis://redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      PSFE_CERT_B64: ${PSFE_CERT_B64}
      PSFE_KEY_B64: ${PSFE_KEY_B64}
      DGII_CA_B64: ${DGII_CA_B64}
      VAULT_MASTER_KEY: ${VAULT_MASTER_KEY}
      TZ: America/Santo_Domingo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecf_net
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import redis; r=redis.from_url(\"redis://redis:6379/0\"); r.ping()' 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=false"

  # Scheduler (jobs periodicos: alertas, reset contadores)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: python -m ecf_core.scheduler
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://saas_ecf:${DB_PASSWORD}@postgres:5432/saas_ecf
      REDIS_URL: redis://redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      VAULT_MASTER_KEY: ${VAULT_MASTER_KEY}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      ALERT_FROM_EMAIL: ${ALERT_FROM_EMAIL:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecf_net
    labels:
      - "traefik.enable=false"

  # Portal Admin (diferido — no implementado aún)
  # portal:
  #   build:
  #     context: ./portal_admin
  #     dockerfile: Dockerfile
  #   restart: unless-stopped
  #   environment:
  #     API_URL: http://api:8000
  #     NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
  #   depends_on:
  #     - api
  #   networks:
  #     - ecf_net
  #   labels:
  #     - "traefik.enable=true"
  #     - "traefik.http.routers.portal.rule=Host(`${PORTAL_DOMAIN:-portal.ecf.local}`)"
  #     - "traefik.http.routers.portal.entrypoints=websecure"
  #     - "traefik.http.routers.portal.tls=true"
  #     - "traefik.http.routers.portal.tls.certresolver=letsencrypt"
  #     - "traefik.http.routers.portal.middlewares=security-headers@docker"
  #     - "traefik.http.services.portal.loadbalancer.server.port=3000"

  # PostgreSQL 16 (datos fiscales — backup obligatorio DGII)
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: saas_ecf
      POSTGRES_USER: saas_ecf
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d
    networks:
      - ecf_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas_ecf"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=false"

  # Redis 7 (cola de e-CF y cache)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redisdata:/data
    networks:
      - ecf_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=false"

# Red aislada para todos los servicios ECF
networks:
  ecf_net:
    driver: bridge
    name: ecf_network

# Volumenes persistentes
volumes:
  pgdata:
    name: ecf_pgdata
  redisdata:
    name: ecf_redisdata
  letsencrypt:
    name: ecf_letsencrypt
  traefik_logs:
    name: ecf_traefik_logs
