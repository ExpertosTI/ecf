# Renace e-CF — Protocolo de Despliegue Swarm (DGII Compliance)
version: '3.8'

services:
  # Traefik — Orquestador de Tráfico y Seguridad TLS
  # Este servicio reemplaza al Nginx nativo del servidor REY
  traefik:
    image: traefik:v3.7
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=RenaceNet"
      - "--providers.swarm=true"
      - "--providers.swarm.exposedbydefault=false"
      - "--providers.swarm.network=RenaceNet"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencryptresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencryptresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencryptresolver.acme.email=${ACME_EMAIL:-admin@renace.tech}"
      - "--certificatesresolvers.letsencryptresolver.acme.storage=/letsencrypt/acme.json"
      - "--accesslog=true"
      - "--accesslog.format=json"
      - "--api=true"
      - "--api.insecure=true"
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
      - target: 8080
        published: 8080
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ecf_letsencrypt:/letsencrypt
      - ./traefik_dynamic.yml:/etc/traefik/dynamic/traefik_dynamic.yml:ro
    networks:
      - RenaceNet
    deploy:
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure

  # API Gateway (FastAPI)
  api:
    image: ecf_api:latest
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql://renace_ecf:${DB_PASSWORD}@postgres:5432/renace_ecf
      REDIS_URL: redis://redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      PSFE_CERT_B64: ${PSFE_CERT_B64}
      PSFE_KEY_B64: ${PSFE_KEY_B64}
      DGII_CA_B64: ${DGII_CA_B64}
      VAULT_MASTER_KEY: ${VAULT_MASTER_KEY}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      ECF_AMBIENTE: ${ECF_AMBIENTE:-produccion}
      TZ: America/Santo_Domingo
    networks:
      - RenaceNet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 512M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.ecf-api.rule=Host(`${ECF_DOMAIN:-ecf.renace.tech}`)"
        - "traefik.http.routers.ecf-api.entrypoints=websecure"
        - "traefik.http.routers.ecf-api.tls=true"
        - "traefik.http.routers.ecf-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.ecf-api.loadbalancer.server.port=8000"

  # Queue Worker
  worker:
    image: ecf_api:latest
    command: python -m ecf_core.worker_main
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: postgresql://renace_ecf:${DB_PASSWORD}@postgres:5432/renace_ecf
      REDIS_URL: redis://redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      VAULT_MASTER_KEY: ${VAULT_MASTER_KEY}
      PSFE_CERT_B64: ${PSFE_CERT_B64}
      PSFE_KEY_B64: ${PSFE_KEY_B64}
      DGII_CA_B64: ${DGII_CA_B64}
      ECF_AMBIENTE: ${ECF_AMBIENTE:-produccion}
    networks:
      - RenaceNet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 256M

  # Scheduler
  scheduler:
    image: ecf_api:latest
    command: python -m ecf_core.scheduler
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: postgresql://renace_ecf:${DB_PASSWORD}@postgres:5432/renace_ecf
      REDIS_URL: redis://redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      VAULT_MASTER_KEY: ${VAULT_MASTER_KEY}
    networks:
      - RenaceNet
    deploy:
      restart_policy:
        condition: on-failure

  # PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: renace_ecf
      POSTGRES_USER: renace_ecf
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ecf_pgdata:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d
    networks:
      - RenaceNet
    deploy:
      restart_policy:
        condition: on-failure

  # Redis 7
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}"
    volumes:
      - ecf_redisdata:/data
    networks:
      - RenaceNet
    deploy:
      restart_policy:
        condition: on-failure

networks:
  RenaceNet:
    external: true

volumes:
  ecf_pgdata:
  ecf_redisdata:
  ecf_letsencrypt:
